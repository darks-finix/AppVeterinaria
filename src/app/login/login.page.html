<ion-content [fullscreen]="true" class="ion-padding">
  <div class="login-container">
    
    <div class="header-section">
      <div class="icon-box">
        <ion-icon name="paw"></ion-icon>
      </div>
      <h1>¡Bienvenido!</h1>
      <p>Inicia sesión para continuar</p>
    </div>

    <div class="form-section">
      <ion-item lines="none" class="input-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" [(ngModel)]="loginData.email" placeholder="Correo electrónico"></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input type="password" [(ngModel)]="loginData.contrasenia" placeholder="Contraseña"></ion-input>
      </ion-item>

      <ion-button expand="block" class="btn-login" (click)="entrar()">
        INGRESAR
      </ion-button>
    </div>

    <div class="footer-section">
      <p>¿No tienes una cuenta? <span class="link" routerLink="/registro">Regístrate</span></p>
    </div>
  </div>
</ion-content>
