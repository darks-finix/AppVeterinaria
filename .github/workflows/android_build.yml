name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Esto te permite ejecutarlo manualmente si quieres

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versión estable y compatible
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # La versión que mejor se lleva con Gradle 8.0

      - name: Install Dependencies
        run: npm install # Usamos install normal para asegurar que descargue todo

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace # Agregamos stacktrace por si algo falla

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Huellitas-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
